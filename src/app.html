<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- viewport-fit=cover is REQUIRED to make env(safe-area-inset-*) return non-zero
       on notched devices; without it the iOS lane safe-area work is dormant. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F8F7F4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0C1021" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ANT" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- Stop iOS Safari auto-linking phone-number-shaped digits in messages/code. -->
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>ANT</title>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
