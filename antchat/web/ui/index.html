<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>antchat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%237aa2f7'/%3E%3Ctext x='8' y='12' text-anchor='middle' font-family='monospace' font-size='10' fill='%230d0d10' font-weight='bold'%3Ea%3C/text%3E%3C/svg%3E">
</head>
<body>
<noscript>antchat web requires JavaScript.</noscript>
<div id="app">loading…</div>
<script>
// Inline boot: copy #token=<uuid> from URL fragment into the __antchat
// cookie, then strip the fragment. Fragments are never transmitted to
// the server, so the launch token never appears in access logs.
(function () {
  var hash = window.location.hash || '';
  var idx = hash.indexOf('token=');
  if (idx !== -1) {
    var raw = hash.slice(idx + 'token='.length).split('&')[0];
    try {
      var tok = decodeURIComponent(raw);
      document.cookie = '__antchat=' + encodeURIComponent(tok) + '; path=/; SameSite=Strict';
    } catch (_) {}
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
})();
</script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
