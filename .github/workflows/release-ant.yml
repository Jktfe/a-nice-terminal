name: Release ant

# Builds standalone macOS and Windows binaries when an `ant-v*` tag is pushed and
# attaches them to a GitHub Release. The version in the tag is
# informational — the binary's own --version comes from
# scripts/ant-cli-version-constant.mjs (generated by prebuild:cli from
# package.json), so bump package.json BEFORE tagging.
#
# Tag format: ant-vMAJOR.MINOR.PATCH (e.g. ant-v0.1.0).
#
# Pipeline: tag push -> matrix build (darwin-arm64 + darwin-x64 + win-x64) ->
# tarball + SHA256 per arch -> release job aggregates artifacts +
# SHA256SUMS + opens a GitHub Release. After release lands,
# homebrew/update-tap.sh <version> opens a tap PR at
# Jktfe/homebrew-antchat with the version + hashes substituted into
# Formula/ant.rb (per m6.1 design doc Q2 delta-3 + Q7 resolution).
#
# Security: every run: block reads tag/version through the
# GITHUB_REF_NAME env var (auto-populated, not user-supplied), never
# via inline interpolation of github.* fields in run commands. All
# matrix values are passed through env: blocks; no shell metachar
# evaluation of user-controlled inputs. Mirrors antchat workflow.

on:
  push:
    tags:
      - 'ant-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - script: arm64-darwin
            os: darwin
            arch: arm64
            ext: tar.gz
            bin_src: dist/ant-aarch64-apple-darwin
            bin_name: ant
            runner: macos-14
            smoke: true
          - script: x64-darwin
            os: darwin
            arch: x64
            ext: tar.gz
            bin_src: dist/ant-x86_64-apple-darwin
            bin_name: ant
            runner: macos-14
            smoke: false
          - script: win-x64
            os: windows
            arch: x64
            ext: zip
            bin_src: dist/ant-x86_64-pc-windows-msvc.exe
            bin_name: ant.exe
            runner: windows-latest
            smoke: true
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - run: bun install --frozen-lockfile

      - name: compile ant
        env:
          SCRIPT: ${{ matrix.script }}
        run: bun run "build:cli:$SCRIPT"

      - name: smoke
        if: matrix.smoke
        env:
          BIN_SRC: ${{ matrix.bin_src }}
        run: |
          set -euo pipefail
          chmod +x "$BIN_SRC"
          "$BIN_SRC" --version | grep -E '^ant [0-9]'
          "$BIN_SRC" --help | grep -E 'fresh-ant CLI'
          "$BIN_SRC" chat --help | grep -E '^ant chat'
          "$BIN_SRC" router --help | grep -E '^ant router'

      - name: package + checksum
        id: pkg
        env:
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          EXT: ${{ matrix.ext }}
          BIN_SRC: ${{ matrix.bin_src }}
          BIN_NAME: ${{ matrix.bin_name }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#ant-v}"
          ARCHIVE="ant-${VERSION}-${OS}-${ARCH}.${EXT}"

          STAGE="$(mktemp -d)"
          cp "$BIN_SRC" "$STAGE/$BIN_NAME"
          chmod +x "$STAGE/$BIN_NAME"

          case "$EXT" in
            tar.gz)
              tar -czf "$ARCHIVE" -C "$STAGE" "$BIN_NAME"
              ;;
            zip)
              # Windows builds run under Git Bash; PowerShell's
              # Compress-Archive is the native zip tool on windows-latest.
              SRC_WIN="$(cygpath -w "$STAGE/$BIN_NAME")"
              ARCHIVE_WIN="$(cygpath -w "$PWD/$ARCHIVE")"
              SRC_WIN="$SRC_WIN" ARCHIVE_WIN="$ARCHIVE_WIN" powershell -NoProfile -Command 'Compress-Archive -LiteralPath $env:SRC_WIN -DestinationPath $env:ARCHIVE_WIN -Force'
              ;;
            *)
              echo "unknown ext: $EXT" >&2
              exit 1
              ;;
          esac
          rm -rf "$STAGE"

          SHA="$(node -e "const fs=require('fs'),crypto=require('crypto');process.stdout.write(crypto.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'))" "$ARCHIVE")"
          {
            echo "archive=$ARCHIVE"
            echo "sha256=$SHA"
            echo "version=$VERSION"
          } >>"$GITHUB_OUTPUT"

          {
            echo "## ${OS}-${ARCH} build"
            echo ""
            echo "- archive: \`$ARCHIVE\`"
            echo "- sha256:  \`$SHA\`"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ant-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: compute checksums
        run: |
          set -euo pipefail
          cd artifacts
          shasum -a 256 ant-*.tar.gz ant-*.zip | tee SHA256SUMS
          {
            echo "### SHA-256 checksums"
            echo ""
            echo '```'
            cat SHA256SUMS
            echo '```'
          } >>"$GITHUB_STEP_SUMMARY"

      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## ant — fresh-ANT CLI (macOS + Windows binaries)

            Standalone — no `bun` or `node` runtime required on the host.

            ### Install — Homebrew

            ```sh
            brew install jktfe/antchat/ant
            ```

            (The `Jktfe/homebrew-antchat` tap ships both `antchat` and
            `ant` formulae for now; a fresh-ANT-only tap may follow once
            branding settles. See m6.1 design doc Q2 delta-3.)

            ### Install — manual tarball (macOS)

            ```sh
            tar -xzf ant-*-darwin-*.tar.gz
            chmod +x ant
            mv ant /usr/local/bin/
            ant --version
            ```

            ### Install — Windows (Scoop)

            ```powershell
            scoop bucket add antchat https://github.com/Jktfe/scoop-antchat
            scoop install antchat/ant
            ```

            Or manually from the zip — extract `ant.exe` and place it on `%PATH%`.

            ### Checksums

            See the `SHA256SUMS` asset attached below.
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
