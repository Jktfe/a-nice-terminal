name: Test

# Sec-iter3 (2026-05-30) — automated test gate for enterprise security
# posture. The repo previously ran tests pre-push manually only; this
# workflow runs them on every PR + push to main so a security
# regression can't land silently.
#
# Scope: `bun run check` (svelte-check, catches type drift) + a tagged
# smoke subset covering the security-load-bearing suites
# (permissionCallerIdentity, handleValidation, verificationLensApi,
# terminals API) + the v0.2 regression corpus. Full 589-test-file suite
# is omitted from CI for runtime reasons — pre-push manual sweep
# remains the canonical "everything green" gate; this CI is the
# enterprise security floor.
#
# better-sqlite3 ABI hazard: the runtime SQLite store binds against
# Node v20.19.4 (see src/lib/server/db.ts header). We pin
# actions/setup-node@v4 with node-version: 20.19.4 + run
# `npm rebuild better-sqlite3` after the bun install so the native
# binding matches the Node version that vitest loads under.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # Fail fast if redacted PII/secrets (operator/company email addresses,
      # the compromised demo-password literal) reappear in tracked files.
      # Comment intentionally omits the literal tokens — the gate scans this
      # workflow file too, so writing them here would self-trip the gate.
      # Cheap, git-only — runs before the toolchain setup.
      - name: redaction gate
        run: bash scripts/ci-redaction-gate.sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: rebuild better-sqlite3 for Node v20.19.4
        # Per src/lib/server/db.ts header — the native binding must match
        # the Node runtime that vitest invokes, not the Node that
        # better-sqlite3 prebuilds shipped against.
        run: npm rebuild better-sqlite3

      - name: svelte-check
        run: bun run check

      - name: vitest — security-load-bearing suites + v0.2 regression
        run: |
          bun x vitest run \
            src/lib/server/verificationLensApi.test.ts \
            src/lib/server/permissionCallerIdentity.test.ts \
            src/lib/server/handleValidation.test.ts \
            src/routes/api/terminals/server.test.ts \
            scripts/v0.2-regression.test.ts
