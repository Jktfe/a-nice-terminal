name: Release antchat

# Builds standalone macOS + Windows binaries when an `antchat-v*` tag is
# pushed and attaches them to a GitHub Release. The version in the tag is
# informational — the binary's own --version comes from antchat/package.json,
# so bump the package.json version BEFORE tagging.
#
# Tag format: antchat-vMAJOR.MINOR.PATCH (e.g. antchat-v0.1.0).
#
# Security note: every `run:` block reads tag/version through the
# GITHUB_REF_NAME env var (auto-populated, not user-supplied), never via
# `${{ github.ref_name }}` interpolation, which would be a command-injection
# vector if a tag name ever contained shell metacharacters.

on:
  push:
    tags:
      - 'antchat-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - script: arm64
            os: darwin
            arch: arm64
            ext: tar.gz
            bin_src: dist/antchat-darwin-arm64
            bin_name: antchat
            smoke: true
          - script: x64
            os: darwin
            arch: x64
            ext: tar.gz
            bin_src: dist/antchat-darwin-x64
            bin_name: antchat
            smoke: false
          - script: win-x64
            os: windows
            arch: x64
            ext: zip
            bin_src: dist/antchat-windows-x64.exe
            bin_name: antchat.exe
            smoke: false
    # All targets cross-compile on macos-14 (Apple Silicon). Bun's
    # bun-darwin-x64 and bun-windows-x64 outputs are identical to what
    # users receive, so build success alone is sufficient correctness
    # signal for the non-native arches. Smoke runs only on arm64 (the
    # one binary the runner can actually execute).
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - run: bun install --frozen-lockfile

      - name: compile antchat (${{ matrix.os }}-${{ matrix.arch }})
        env:
          SCRIPT: ${{ matrix.script }}
        run: bun run "build:antchat:$SCRIPT"

      - name: smoke (${{ matrix.os }}-${{ matrix.arch }})
        if: matrix.smoke
        run: bun run smoke:antchat

      - name: package + checksum
        id: pkg
        env:
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          EXT: ${{ matrix.ext }}
          BIN_SRC: ${{ matrix.bin_src }}
          BIN_NAME: ${{ matrix.bin_name }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#antchat-v}"
          ARCHIVE="antchat-${VERSION}-${OS}-${ARCH}.${EXT}"

          # Stage the binary in a temp dir so the archive contains a flat
          # entry (no `dist/...` prefix). Using a temp dir avoids
          # colliding with the `antchat/` source directory at the repo root.
          STAGE="$(mktemp -d)"
          cp "$BIN_SRC" "$STAGE/$BIN_NAME"

          case "$EXT" in
            tar.gz)
              tar -czf "$ARCHIVE" -C "$STAGE" "$BIN_NAME"
              ;;
            zip)
              # macOS ships `zip`; -j flattens stored paths so the .exe
              # lands at the zip root (matches Scoop's flat-extract setup).
              zip -j -q "$ARCHIVE" "$STAGE/$BIN_NAME"
              ;;
            *)
              echo "unknown ext: $EXT" >&2
              exit 1
              ;;
          esac
          rm -rf "$STAGE"

          SHA="$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')"
          {
            echo "archive=$ARCHIVE"
            echo "sha256=$SHA"
            echo "version=$VERSION"
          } >>"$GITHUB_OUTPUT"

          {
            echo "## ${OS}-${ARCH} build"
            echo ""
            echo "- archive: \`$ARCHIVE\`"
            echo "- sha256:  \`$SHA\`"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: antchat-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.pkg.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: compute checksums
        run: |
          set -euo pipefail
          cd artifacts
          # Hash both archive shapes — tarballs (macOS) + zips (Windows).
          shasum -a 256 antchat-*.tar.gz antchat-*.zip | tee SHA256SUMS
          {
            echo "### SHA-256 checksums"
            echo ""
            echo '```'
            cat SHA256SUMS
            echo '```'
          } >>"$GITHUB_STEP_SUMMARY"

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## antchat (macOS + Windows binaries)

            Standalone — no `bun` runtime required on the host.

            ### Install — macOS

            Homebrew tap:
            ```sh
            brew install jktfe/antchat/antchat
            ```

            Or manually from the tarball:
            ```sh
            tar -xzf antchat-*-darwin-*.tar.gz
            chmod +x antchat
            mv antchat /usr/local/bin/
            antchat --version
            ```

            ### Install — Windows

            Scoop bucket:
            ```powershell
            scoop bucket add antchat https://github.com/Jktfe/scoop-antchat
            scoop install antchat
            ```

            Or manually from the zip — extract `antchat.exe` and place it on `%PATH%`.

            ### Checksums

            See the `SHA256SUMS` asset attached below.
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
