name: Feature request
description: Suggest an improvement to ANT
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or workflow gap does this request address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, or related issues
