version: 2
updates:
  # npm dependencies (bun reads package.json + package-lock.json so npm scope is canonical)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Group minor/patch bumps so the queue stays readable; majors stay separate
    # because they often need code adjustments.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions (uses: pins). Keeps actions/checkout, setup-node,
  # setup-bun current with security patches.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # CLI subpackage has its own bun.lock + package.json
  - package-ecosystem: "npm"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cli"
