<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Pi local runtime adapter lane</title>
  <desc id="desc">A compact local runtime lane showing prompt, local model, transcript adapter, and verification.</desc>
  <rect width="1200" height="420" rx="28" fill="#16120c"/>
  <rect x="46" y="42" width="1108" height="336" rx="22" fill="#21180e" stroke="#f59e0b" stroke-opacity=".55"/>
  <text x="78" y="96" fill="#ffedd5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="32" font-weight="700">pi local runtime</text>
  <text x="78" y="132" fill="#fbbf24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">small task -> local model -> transcript evidence -> verified handoff</text>
  <g fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round">
    <path d="M175 255 H355"/>
    <path d="M515 255 H695"/>
    <path d="M855 255 H1035"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <g fill="#3b260b" stroke="#fbbf24">
      <rect x="86" y="204" width="180" height="102" rx="18"/>
      <rect x="356" y="204" width="180" height="102" rx="18"/>
      <rect x="626" y="204" width="180" height="102" rx="18"/>
      <rect x="896" y="204" width="180" height="102" rx="18"/>
    </g>
    <g fill="#fff7ed" font-size="17">
      <text x="176" y="262">PROMPT</text>
      <text x="446" y="262">LOCAL</text>
      <text x="716" y="262">JSONL</text>
      <text x="986" y="262">VERIFY</text>
    </g>
  </g>
</svg>
