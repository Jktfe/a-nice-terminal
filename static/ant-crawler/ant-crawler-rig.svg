        <path class="limb-core" d="M15 37 C5 32 -5 31 -15 34"/>
      </g>
      <g id="front-far-foot" class="segment foot phase-b" style="transform-origin: -15px 34px" data-joint="-15 34">
        <path class="limb-shell" d="M-15 34 L-23 38"/>
        <path class="limb-core" d="M-15 34 L-23 38"/>
      </g>
    </g>

    <g id="middle-far-leg" data-phase="a">
      <g id="middle-far-upper" class="segment upper phase-a" style="transform-origin: 76px 66px" data-joint="76 66">
        <path class="limb-shell" d="M76 66 C75 51 79 39 87 28"/>
        <path class="limb-core" d="M76 66 C75 51 79 39 87 28"/>
      </g>
      <g id="middle-far-lower" class="segment lower phase-a" style="transform-origin: 87px 28px" data-joint="87 28">
        <path class="limb-shell" d="M87 28 C96 18 106 13 119 13"/>
        <path class="limb-core" d="M87 28 C96 18 106 13 119 13"/>
      </g>
      <g id="middle-far-foot" class="segment foot phase-a" style="transform-origin: 119px 13px" data-joint="119 13">
        <path class="limb-shell" d="M119 13 L131 13"/>
        <path class="limb-core" d="M119 13 L131 13"/>
      </g>
    </g>

    <g id="rear-far-leg" data-phase="b">
      <g id="rear-far-upper" class="segment upper phase-b" style="transform-origin: 107px 73px" data-joint="107 73">
        <path class="limb-shell" d="M107 73 C123 63 138 59 154 62"/>
        <path class="limb-core" d="M107 73 C123 63 138 59 154 62"/>
      </g>
      <g id="rear-far-lower" class="segment lower phase-b" style="transform-origin: 154px 62px" data-joint="154 62">
        <path class="limb-shell" d="M154 62 C162 65 167 71 169 80"/>
        <path class="limb-core" d="M154 62 C162 65 167 71 169 80"/>
      </g>
      <g id="rear-far-foot" class="segment foot phase-b" style="transform-origin: 169px 80px" data-joint="169 80">
        <path class="limb-shell" d="M169 80 L174 88"/>
        <path class="limb-core" d="M169 80 L174 88"/>
      </g>
    </g>
  </g>

  <g id="body-rig" class="part" filter="url(#soft-shadow)">
    <g id="body-union" class="part" data-pivot="82 82">
      <path class="body-fill" opacity="0.94" d="M24 51 C34 43 48 44 58 52 C66 58 73 59 86 56 C105 51 130 55 148 70 C165 84 167 106 151 120 C134 136 101 132 82 114 C75 108 70 106 60 111 C41 119 19 113 9 96 C-1 79 6 62 24 51 Z"/>
    </g>

