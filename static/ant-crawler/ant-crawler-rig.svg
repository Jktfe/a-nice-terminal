      <path class="rim" d="M88 67 C106 54 137 58 151 77 C165 96 153 121 128 127 C105 132 84 119 80 99 C77 84 80 74 88 67 Z"/>
      <path class="body-fill" d="M92 70 C109 60 134 63 146 80 C157 95 148 114 126 119 C106 124 88 113 85 98 C83 86 85 76 92 70 Z"/>
      <path class="body-gloss" d="M101 65 C118 62 136 67 146 80"/>
    </g>

    <g id="thorax-plate" class="part" data-pivot="70 82">
      <path class="rim" d="M45 65 C60 52 86 55 100 72 C113 88 104 109 81 115 C59 120 41 107 39 88 C37 77 39 70 45 65 Z"/>
      <path class="body-fill" d="M50 69 C63 59 84 62 95 76 C105 89 97 103 79 108 C61 112 47 102 46 88 C45 79 46 73 50 69 Z"/>
