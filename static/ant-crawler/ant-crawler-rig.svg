<svg xmlns="http://www.w3.org/2000/svg" viewBox="-36 0 232 162" class="ant-crawler-rig" role="img" aria-labelledby="ant-crawler-title ant-crawler-desc">
  <title id="ant-crawler-title">ANT crawler rig</title>
  <desc id="ant-crawler-desc">A polished ANT ant split into independently animatable body, antenna, and six leg assemblies.</desc>
  <!--
    Source reference: ~/Downloads/ant.svg lines 1-18
    Verdict: CHANGE
    Simplification: Rebuilt as a premium vector rig instead of copying compound
    source paths. The supplied ant defines the character: dark body, white rim,
    black outer line, green eye, and crawling stance. This file defines the
    production animation skeleton.
  -->
  <style>
    .ant-crawler-rig {
      --ink: #08243b;
      --ink-deep: #031525;
      --ink-far: #12344f;
      --shell: #ffffff;
      --outline: #050505;
      --eye: #18d877;
      --eye-deep: #0fb85f;
      --shine: #ffffff;
      --speed: 680ms;
    }

    .rig-part,
    .segment,
    .antenna-segment {
      transform-box: view-box;
      transform-origin: center;
    }

    .shell-stroke {
      fill: none;
      stroke: var(--shell);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 10;
    }

    .black-stroke {
      fill: none;
      stroke: var(--outline);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .limb-core {
      fill: none;
      stroke: var(--ink);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 5.4;
    }

    .far .limb-core {
      stroke: var(--ink-far);
      opacity: 0.72;
    }

    .body-rim {
      fill: var(--shell);
      stroke: var(--outline);
      stroke-width: 2.1;
      stroke-linejoin: round;
    }

    .body-fill {
      fill: url(#ant-body-gradient);
    }

    .body-highlight {
      fill: none;
      stroke: rgba(255, 255, 255, 0.22);
      stroke-linecap: round;
      stroke-width: 3.2;
    }

    .eye-fill {
      fill: url(#ant-eye-gradient);
    }

    .eye-shine {
      fill: var(--shine);
    }

    .joint {
      fill: var(--ink);
      opacity: 0;
    }

    .ant-crawler-rig.is-crawling #body-rig {
      animation: body-rise var(--speed) ease-in-out infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-a.upper {
      animation: upper-a var(--speed) cubic-bezier(.42, 0, .3, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-a.lower {
      animation: lower-a var(--speed) cubic-bezier(.42, 0, .3, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-a.foot {
      animation: foot-a var(--speed) cubic-bezier(.42, 0, .3, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-b.upper {
      animation: upper-b var(--speed) cubic-bezier(.42, 0, .3, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-b.lower {
      animation: lower-b var(--speed) cubic-bezier(.42, 0, .3, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-b.foot {
      animation: foot-b var(--speed) cubic-bezier(.42, 0, .3, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .antenna-segment {
      animation: antenna-feel 1120ms ease-in-out infinite alternate;
    }

    @keyframes body-rise {
      from { transform: translateY(0); }
      to { transform: translateY(-2px); }
    }

    @keyframes upper-a {
      from { transform: rotate(-6deg); }
      to { transform: rotate(10deg); }
    }

    @keyframes lower-a {
      from { transform: rotate(10deg); }
      to { transform: rotate(-12deg); }
    }

    @keyframes foot-a {
      from { transform: rotate(-5deg) translateX(-1px); }
      to { transform: rotate(7deg) translateX(2px); }
    }

    @keyframes upper-b {
      from { transform: rotate(10deg); }
      to { transform: rotate(-6deg); }
    }

    @keyframes lower-b {
      from { transform: rotate(-12deg); }
      to { transform: rotate(10deg); }
    }

    @keyframes foot-b {
      from { transform: rotate(7deg) translateX(2px); }
      to { transform: rotate(-5deg) translateX(-1px); }
    }

    @keyframes antenna-feel {
      from { transform: rotate(-3deg); }
      to { transform: rotate(4deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .ant-crawler-rig.is-crawling .rig-part,
      .ant-crawler-rig.is-crawling .segment,
      .ant-crawler-rig.is-crawling .antenna-segment {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="ant-body-gradient" x1="20" x2="134" y1="44" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c304f"/>
      <stop offset="0.48" stop-color="#08243b"/>
      <stop offset="1" stop-color="#031525"/>
    </linearGradient>
    <radialGradient id="ant-eye-gradient" cx="0" cy="0" r="1" gradientTransform="translate(25 73) rotate(35) scale(18 25)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#32f28c"/>
      <stop offset="0.72" stop-color="var(--eye)"/>
      <stop offset="1" stop-color="var(--eye-deep)"/>
    </radialGradient>
    <filter id="soft-ant-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#00111d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g id="legs-far" class="rig-part far" data-layer="behind-body">
    <g id="front-far-leg" class="leg" data-phase="b">
      <g id="front-far-upper" class="segment upper phase-b" style="transform-origin: 46px 66px" data-joint="46 66">
        <path class="shell-stroke" d="M46 66 C35 53 26 44 15 36"/>
        <path class="limb-core" d="M46 66 C35 53 26 44 15 36"/>
      </g>
      <g id="front-far-lower" class="segment lower phase-b" style="transform-origin: 15px 36px" data-joint="15 36">
        <path class="shell-stroke" d="M15 36 C6 31 -2 30 -11 31"/>
        <path class="limb-core" d="M15 36 C6 31 -2 30 -11 31"/>
      </g>
      <g id="front-far-foot" class="segment foot phase-b" style="transform-origin: -11px 31px" data-joint="-11 31">
        <path class="shell-stroke" d="M-11 31 L-17 35"/>
        <path class="limb-core" d="M-11 31 L-17 35"/>
      </g>
    </g>

    <g id="middle-far-leg" class="leg" data-phase="a">
      <g id="middle-far-upper" class="segment upper phase-a" style="transform-origin: 73px 67px" data-joint="73 67">
        <path class="shell-stroke" d="M73 67 C73 53 75 42 80 31"/>
        <path class="limb-core" d="M73 67 C73 53 75 42 80 31"/>
      </g>
      <g id="middle-far-lower" class="segment lower phase-a" style="transform-origin: 80px 31px" data-joint="80 31">
        <path class="shell-stroke" d="M80 31 C87 21 95 15 105 12"/>
        <path class="limb-core" d="M80 31 C87 21 95 15 105 12"/>
      </g>
      <g id="middle-far-foot" class="segment foot phase-a" style="transform-origin: 105px 12px" data-joint="105 12">
        <path class="shell-stroke" d="M105 12 L117 12"/>
        <path class="limb-core" d="M105 12 L117 12"/>
      </g>
    </g>

    <g id="rear-far-leg" class="leg" data-phase="b">
      <g id="rear-far-upper" class="segment upper phase-b" style="transform-origin: 105px 73px" data-joint="105 73">
        <path class="shell-stroke" d="M105 73 C118 62 131 56 145 55"/>
        <path class="limb-core" d="M105 73 C118 62 131 56 145 55"/>
      </g>
      <g id="rear-far-lower" class="segment lower phase-b" style="transform-origin: 145px 55px" data-joint="145 55">
        <path class="shell-stroke" d="M145 55 C153 55 159 58 163 63"/>
        <path class="limb-core" d="M145 55 C153 55 159 58 163 63"/>
      </g>
      <g id="rear-far-foot" class="segment foot phase-b" style="transform-origin: 163px 63px" data-joint="163 63">
        <path class="shell-stroke" d="M163 63 L166 72"/>
        <path class="limb-core" d="M163 63 L166 72"/>
      </g>
    </g>
  </g>

  <g id="body-rig" class="rig-part" filter="url(#soft-ant-shadow)" data-layer="body">
    <g id="abdomen" class="rig-part" data-pivot="111 83">
      <path class="body-rim" d="M82 65 C98 48 133 51 151 72 C167 91 155 119 127 126 C101 132 75 116 72 93 C70 80 75 71 82 65 Z"/>
      <path class="body-fill" d="M86 68 C101 55 130 57 146 75 C158 90 149 112 125 118 C103 124 82 111 79 92 C77 81 80 73 86 68 Z"/>
      <path class="body-highlight" d="M95 61 C113 56 134 61 146 76"/>
    </g>

    <g id="thorax" class="rig-part" data-pivot="75 80">
      <path class="body-rim" d="M47 66 C63 51 91 54 104 72 C118 91 104 113 79 116 C55 119 39 103 39 83 C39 75 42 70 47 66 Z"/>
      <path class="body-fill" d="M52 69 C66 58 87 61 98 76 C108 91 97 106 78 109 C59 111 46 99 46 84 C46 77 48 73 52 69 Z"/>
      <path class="body-highlight" d="M55 64 C70 59 89 63 99 75"/>
    </g>

    <g id="head" class="rig-part" data-pivot="34 75">
      <path class="body-rim" d="M37.2 46.5 C45.5 46.5 51 50.1 54 52.9 C60.9 59.9 60.9 71.2 54.2 79.4 C49.9 84.9 42.6 87.7 35.6 89.7 C31 91 23.7 92.5 18.5 92.4 C16.6 92.4 15.0 91.9 13.7 90.6 C11.4 88.1 10.5 82 10.5 78 C10.5 69 14.7 59.9 21.1 54.4 C21.6 53.6 23.9 52.6 24.3 51.5 C25.2 48 30.4 46.7 37.2 46.5 Z"/>
      <path class="body-fill" d="M37.2 46.5 C45.5 46.5 51 50.1 54 52.9 C60.9 59.9 60.9 71.2 54.2 79.4 C49.9 84.9 42.6 87.7 35.6 89.7 C31 91 23.7 92.5 18.5 92.4 C16.6 92.4 15.0 91.9 13.7 90.6 C11.4 88.1 10.5 82 10.5 78 C10.5 69 14.7 59.9 21.1 54.4 C21.6 53.6 23.9 52.6 24.3 51.5 C25.2 48 30.4 46.7 37.2 46.5 Z"/>
      <path class="body-highlight" d="M15.2 87.2 C12.8 77.8 15.3 65.5 22.2 56.5"/>
      <g id="eye" class="rig-part" data-pivot="27 76">
        <path class="eye-fill" d="M30.5 63.6 C23.4 63.7 16.6 69.9 15.6 79.1 C15.6 83.9 16.5 85.0 19.4 84.5 C24.5 84.0 33.2 78.7 36.0 72.9 C38.9 66.4 36.1 63.6 30.5 63.6 Z"/>
        <path id="eye-shine-large" class="eye-shine" d="M25.6 72.9 C24.5 75.4 22.0 76.9 20.4 75.9 C18.7 75.0 18.5 72.5 19.9 70.4 C21.2 68.4 23.6 67.2 25.1 68.2 C26.5 69.0 26.6 71.0 25.6 72.9 Z"/>
        <circle id="eye-shine-small" class="eye-shine" cx="28.6" cy="66.4" r="1.1" opacity="0.68"/>
      </g>
    </g>
  </g>

  <g id="antennae" class="rig-part" data-layer="above-body">
    <g id="upper-antenna" class="antenna-segment" style="transform-origin: 20px 53px" data-joint="20 53">
      <path class="shell-stroke" d="M20 53 C9 38 2 25 -2 12"/>
      <path class="limb-core" d="M20 53 C9 38 2 25 -2 12"/>
      <path class="black-stroke" d="M20 53 C9 38 2 25 -2 12"/>
    </g>
    <g id="lower-antenna" class="antenna-segment" style="transform-origin: 18px 60px" data-joint="18 60">
      <path class="shell-stroke" d="M18 60 C5 50 -6 43 -16 39"/>
      <path class="limb-core" d="M18 60 C5 50 -6 43 -16 39"/>
      <path class="black-stroke" d="M18 60 C5 50 -6 43 -16 39"/>
    </g>
  </g>

  <g id="legs-near" class="rig-part near" data-layer="above-body">
    <g id="front-near-leg" class="leg" data-phase="a">
      <g id="front-near-upper" class="segment upper phase-a" style="transform-origin: 48px 83px" data-joint="48 83">
        <path class="shell-stroke" d="M48 83 C38 96 29 109 20 121"/>
        <path class="limb-core" d="M48 83 C38 96 29 109 20 121"/>
        <circle class="joint" cx="48" cy="83" r="2"/>
      </g>
      <g id="front-near-lower" class="segment lower phase-a" style="transform-origin: 20px 121px" data-joint="20 121">
        <path class="shell-stroke" d="M20 121 C9 130 -1 136 -12 139"/>
        <path class="limb-core" d="M20 121 C9 130 -1 136 -12 139"/>
      </g>
      <g id="front-near-foot" class="segment foot phase-a" style="transform-origin: -12px 139px" data-joint="-12 139">
        <path class="shell-stroke" d="M-12 139 L-20 136"/>
        <path class="limb-core" d="M-12 139 L-20 136"/>
      </g>
    </g>

    <g id="middle-near-leg" class="leg" data-phase="b">
      <g id="middle-near-upper" class="segment upper phase-b" style="transform-origin: 77px 88px" data-joint="77 88">
        <path class="shell-stroke" d="M77 88 C71 105 64 121 56 136"/>
        <path class="limb-core" d="M77 88 C71 105 64 121 56 136"/>
        <circle class="joint" cx="77" cy="88" r="2"/>
      </g>
      <g id="middle-near-lower" class="segment lower phase-b" style="transform-origin: 56px 136px" data-joint="56 136">
        <path class="shell-stroke" d="M56 136 C51 146 45 151 36 152"/>
        <path class="limb-core" d="M56 136 C51 146 45 151 36 152"/>
      </g>
      <g id="middle-near-foot" class="segment foot phase-b" style="transform-origin: 36px 152px" data-joint="36 152">
        <path class="shell-stroke" d="M36 152 L24 152"/>
        <path class="limb-core" d="M36 152 L24 152"/>
      </g>
    </g>

    <g id="rear-near-leg" class="leg" data-phase="a">
      <g id="rear-near-upper" class="segment upper phase-a" style="transform-origin: 101px 91px" data-joint="101 91">
        <path class="shell-stroke" d="M101 91 C116 102 128 114 139 128"/>
        <path class="limb-core" d="M101 91 C116 102 128 114 139 128"/>
        <circle class="joint" cx="101" cy="91" r="2"/>
      </g>
      <g id="rear-near-lower" class="segment lower phase-a" style="transform-origin: 139px 128px" data-joint="139 128">
        <path class="shell-stroke" d="M139 128 C149 139 158 144 168 146"/>
        <path class="limb-core" d="M139 128 C149 139 158 144 168 146"/>
      </g>
      <g id="rear-near-foot" class="segment foot phase-a" style="transform-origin: 168px 146px" data-joint="168 146">
        <path class="shell-stroke" d="M168 146 L176 139"/>
        <path class="limb-core" d="M168 146 L176 139"/>
      </g>
    </g>
  </g>
</svg>
