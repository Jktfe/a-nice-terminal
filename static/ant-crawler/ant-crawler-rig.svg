<svg xmlns="http://www.w3.org/2000/svg" viewBox="-34 2 226 154" class="ant-crawler-rig" role="img" aria-labelledby="ant-crawler-title ant-crawler-desc">
  <title id="ant-crawler-title">ANT premium crawler rig</title>
  <desc id="ant-crawler-desc">A premium ANT ant SVG rig with independently animatable antennae, body masses, sockets, and six segmented legs.</desc>
  <!--
    Source reference: /Users/jamesking/Downloads/ant.svg lines 1-18
    Verdict: CHANGE
    Simplification: Rebuilt as premium animation-ready geometry. The supplied
    SVG sets the character: asymmetric head, dark body, white rim, black line,
    green eye, and low crawling stance. This rig keeps those cues while exposing
    body, antennae, sockets, and leg segments as independent animation targets.
  -->
  <style>
    .ant-crawler-rig {
      --ink: #08253d;
      --ink-deep: #031524;
      --ink-far: #526c80;
      --shell: #ffffff;
      --outline: #050505;
      --eye: #1cd372;
      --eye-hot: #40f497;
      --speed: 720ms;
      background: transparent;
    }

    .part,
    .segment {
      transform-box: view-box;
      transform-origin: center;
    }

    .rim {
      fill: var(--shell);
      stroke: var(--outline);
      stroke-width: 2.15;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .body-fill {
      fill: url(#body-gradient);
    }

    .head-fill {
      fill: url(#head-gradient);
    }

    .body-gloss {
      fill: none;
      stroke: rgba(255, 255, 255, 0.26);
      stroke-width: 3.2;
      stroke-linecap: round;
    }

    .socket {
      fill: #12334f;
      stroke: rgba(255, 255, 255, 0.78);
      stroke-width: 0.85;
      opacity: 0.8;
    }

    .limb-shell,
    .antenna-shell {
      fill: none;
      stroke: var(--shell);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .limb-core,
    .antenna-core {
      fill: none;
      stroke: var(--ink);
      stroke-width: 5.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .far .limb-core {
      stroke: var(--ink-far);
      opacity: 0.86;
    }

    .eye {
      fill: url(#eye-gradient);
    }

    .shine {
      fill: var(--shell);
    }

    .ant-crawler-rig.is-crawling #body-rig {
      animation: body-crawl-bob var(--speed) ease-in-out infinite alternate;
    }

    .ant-crawler-rig.is-crawling #head {
      animation: head-feel 1440ms ease-in-out infinite alternate;
    }

    .ant-crawler-rig.is-crawling .antenna {
      animation: antenna-feel 960ms ease-in-out infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-a.upper {
      animation: upper-a var(--speed) cubic-bezier(.4, 0, .28, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-a.lower {
      animation: lower-a var(--speed) cubic-bezier(.4, 0, .28, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-a.foot {
      animation: foot-a var(--speed) cubic-bezier(.4, 0, .28, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-b.upper {
      animation: upper-b var(--speed) cubic-bezier(.4, 0, .28, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-b.lower {
      animation: lower-b var(--speed) cubic-bezier(.4, 0, .28, 1) infinite alternate;
    }

    .ant-crawler-rig.is-crawling .phase-b.foot {
      animation: foot-b var(--speed) cubic-bezier(.4, 0, .28, 1) infinite alternate;
    }

    @keyframes body-crawl-bob {
      from { transform: translateY(0); }
      to { transform: translateY(-1.8px); }
    }

    @keyframes head-feel {
      from { transform: rotate(-1deg) translateY(0.4px); }
      to { transform: rotate(1.8deg) translateY(-0.8px); }
    }

    @keyframes antenna-feel {
      from { transform: rotate(-4deg); }
      to { transform: rotate(5deg); }
    }

    @keyframes upper-a {
      from { transform: rotate(-7deg); }
      to { transform: rotate(10deg); }
    }

    @keyframes lower-a {
      from { transform: rotate(10deg); }
      to { transform: rotate(-11deg); }
    }

    @keyframes foot-a {
      from { transform: rotate(-4deg) translateX(-1px); }
      to { transform: rotate(8deg) translateX(2px); }
    }

    @keyframes upper-b {
      from { transform: rotate(10deg); }
      to { transform: rotate(-7deg); }
    }

    @keyframes lower-b {
      from { transform: rotate(-11deg); }
      to { transform: rotate(10deg); }
    }

    @keyframes foot-b {
      from { transform: rotate(8deg) translateX(2px); }
      to { transform: rotate(-4deg) translateX(-1px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .ant-crawler-rig.is-crawling .part,
      .ant-crawler-rig.is-crawling .segment {
        animation: none;
      }
    }
  </style>

  <defs>
    <linearGradient id="body-gradient" x1="11" x2="153" y1="48" y2="125" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d3556"/>
      <stop offset="0.5" stop-color="#08253d"/>
      <stop offset="1" stop-color="#021222"/>
    </linearGradient>
    <linearGradient id="head-gradient" x1="12" x2="62" y1="56" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b304f"/>
      <stop offset="1" stop-color="#031524"/>
    </linearGradient>
    <radialGradient id="eye-gradient" cx="0" cy="0" r="1" gradientTransform="translate(26 73) rotate(35) scale(18 25)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--eye-hot)"/>
      <stop offset="0.74" stop-color="var(--eye)"/>
      <stop offset="1" stop-color="#0fb65f"/>
    </radialGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="4" flood-color="#00121f" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g id="legs-far" class="part far" data-layer="behind-body">
    <g id="front-far-leg" data-phase="b">
      <g id="front-far-upper" class="segment upper phase-b" style="transform-origin: 48px 66px" data-joint="48 66">
        <path class="limb-shell" d="M48 66 C36 54 27 45 15 37"/>
        <path class="limb-core" d="M48 66 C36 54 27 45 15 37"/>
      </g>
      <g id="front-far-lower" class="segment lower phase-b" style="transform-origin: 15px 37px" data-joint="15 37">
