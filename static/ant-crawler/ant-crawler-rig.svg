    <g id="head" class="part" style="transform-origin: 33px 75px" data-pivot="33 75">
      <path class="rim" d="M37.2 46.5 C45.5 46.5 51 50.1 54 52.9 C60.9 59.9 60.9 71.2 54.2 79.4 C49.9 84.9 42.6 87.7 35.6 89.7 C31 91 23.7 92.5 18.5 92.4 C16.6 92.4 15 91.9 13.7 90.6 C11.4 88.1 10.5 82 10.5 78 C10.5 69 14.7 59.9 21.1 54.4 C21.6 53.6 23.9 52.6 24.3 51.5 C25.2 48 30.4 46.7 37.2 46.5 Z"/>
      <path class="head-fill" d="M37.2 46.5 C45.5 46.5 51 50.1 54 52.9 C60.9 59.9 60.9 71.2 54.2 79.4 C49.9 84.9 42.6 87.7 35.6 89.7 C31 91 23.7 92.5 18.5 92.4 C16.6 92.4 15 91.9 13.7 90.6 C11.4 88.1 10.5 82 10.5 78 C10.5 69 14.7 59.9 21.1 54.4 C21.6 53.6 23.9 52.6 24.3 51.5 C25.2 48 30.4 46.7 37.2 46.5 Z"/>
      <path class="body-gloss" d="M15 86 C13 77 16 65 22 56"/>
      <path class="eye" d="M30.5 63.6 C23.4 63.7 16.6 69.9 15.6 79.1 C15.6 83.9 16.5 85 19.4 84.5 C24.5 84 33.2 78.7 36 72.9 C38.9 66.4 36.1 63.6 30.5 63.6 Z"/>
      <path class="shine" d="M25.6 72.9 C24.5 75.4 22 76.9 20.4 75.9 C18.7 75 18.5 72.5 19.9 70.4 C21.2 68.4 23.7 67.2 25.1 68.2 C26.5 69 26.6 71 25.6 72.9 Z"/>
      <circle class="shine" cx="28.8" cy="66.3" r="1.1" opacity="0.7"/>
    </g>

    <g id="sockets" class="part" aria-hidden="true">
      <ellipse class="socket" cx="48" cy="84" rx="7" ry="4.8" transform="rotate(-45 48 84)"/>
      <ellipse class="socket" cx="76" cy="88" rx="6.8" ry="4.6" transform="rotate(-64 76 88)"/>
      <ellipse class="socket" cx="101" cy="91" rx="7.4" ry="4.8" transform="rotate(37 101 91)"/>
      <ellipse class="socket" cx="48" cy="66" rx="5.8" ry="3.8" transform="rotate(38 48 66)" opacity="0.78"/>
      <ellipse class="socket" cx="76" cy="66" rx="5.8" ry="3.8" transform="rotate(-70 76 66)" opacity="0.78"/>
      <ellipse class="socket" cx="107" cy="73" rx="6.4" ry="3.8" transform="rotate(-17 107 73)" opacity="0.78"/>
    </g>
  </g>

  <g id="antennae" class="part">
    <g id="upper-antenna" class="segment antenna" style="transform-origin: 21px 54px" data-joint="21 54">
      <path class="antenna-shell" d="M21 54 C10 40 2 26 -4 12"/>
      <path class="antenna-core" d="M21 54 C10 40 2 26 -4 12"/>
    </g>
    <g id="lower-antenna" class="segment antenna" style="transform-origin: 20px 59px" data-joint="20 59">
