<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANT Premium Crawler Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #04080c;
        --panel: rgba(255, 255, 255, 0.07);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f5fbf7;
        --muted: #a9b8b0;
        --accent: #1cd372;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 50% 30%, rgba(28, 211, 114, 0.2), transparent 42%),
          var(--bg);
        background-size: 34px 34px, 34px 34px, 100% 100%, 100% 100%;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 34px 0 48px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 66px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
        max-width: 52ch;
      }

      .stage {
        position: relative;
        overflow: hidden;
        min-height: 570px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background:
          radial-gradient(circle at 58% 44%, rgba(255, 255, 255, 0.08), transparent 46%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
        box-shadow: 0 36px 96px rgba(0, 0, 0, 0.48);
      }

      .crawl-track {
        position: absolute;
        left: 7%;
        right: 7%;
        bottom: 28%;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      }

      .rig-mount {
        position: absolute;
        width: min(760px, 82vw);
        height: auto;
        aspect-ratio: 226 / 154;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.28));
      }

      .rig-mount svg {
        display: block;
        width: 100%;
        height: auto;
        overflow: visible;
      }

      .controls {
        position: absolute;
        right: 18px;
        bottom: 18px;
        display: flex;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 10px 13px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      button.active {
        border-color: rgba(28, 211, 114, 0.75);
        background: rgba(28, 211, 114, 0.16);
      }

      .strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .part-card {
        min-height: 138px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        padding: 12px;
      }

      .part-card img {
        display: block;
        width: 100%;
        height: 92px;
        object-fit: contain;
        margin-bottom: 8px;
      }

      .part-card span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 760px) {
        header { display: block; }
        .stage { min-height: 430px; }
        .strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ANT crawler rig</h1>
          <p>Premium animation asset pack: a polished assembled rig plus individual SVG elements for the head, body masses, antennae, and limbs.</p>
        </div>
      </header>

      <section class="stage" aria-label="Animated ANT crawler demo">
        <div class="crawl-track"></div>
        <div id="rigMount" class="rig-mount" aria-label="Animated ANT crawler rig"></div>
        <div class="controls" aria-label="Animation controls">
          <button id="crawl" class="active" type="button">Crawl</button>
          <button id="still" type="button">Still</button>
        </div>
      </section>

      <section class="strip" aria-label="Individual SVG elements">
        <div class="part-card"><img src="./elements/head.svg" alt="Head element" /><span>Head</span></div>
        <div class="part-card"><img src="./elements/thorax.svg" alt="Thorax element" /><span>Thorax</span></div>
        <div class="part-card"><img src="./elements/abdomen.svg" alt="Abdomen element" /><span>Abdomen</span></div>
        <div class="part-card"><img src="./elements/antennae.svg" alt="Antennae element" /><span>Antennae</span></div>
        <div class="part-card"><img src="./elements/front-leg.svg" alt="Front leg element" /><span>Front leg</span></div>
        <div class="part-card"><img src="./elements/middle-leg.svg" alt="Middle leg element" /><span>Middle leg</span></div>
        <div class="part-card"><img src="./elements/rear-leg.svg" alt="Rear leg element" /><span>Rear leg</span></div>
        <div class="part-card"><img src="./ant-crawler-elements.svg" alt="Element contact sheet" /><span>Contact sheet</span></div>
      </section>
    </main>

    <script>
      const rigMount = document.querySelector("#rigMount");
      const crawl = document.querySelector("#crawl");
      const still = document.querySelector("#still");
      let rigRoot = null;

      function setCrawling(enabled) {
        if (!rigRoot) return;
        rigRoot.classList.toggle("is-crawling", enabled);
        crawl.classList.toggle("active", enabled);
        still.classList.toggle("active", !enabled);
      }

      fetch("./ant-crawler-rig.svg")
        .then((response) => response.text())
        .then((svg) => {
          rigMount.innerHTML = svg;
          rigRoot = rigMount.querySelector("svg");
          setCrawling(true);
        });

      crawl.addEventListener("click", () => setCrawling(true));
      still.addEventListener("click", () => setCrawling(false));
    </script>
  </body>
</html>
