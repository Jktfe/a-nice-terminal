<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 760" role="img" aria-labelledby="title desc">
  <title id="title">ANT mode matrices — routing × room-mode and focus × inbox-queue</title>
  <desc id="desc">Two reference matrices showing the cell-by-cell behaviour: each routing token under each room mode, and each addressing pattern under each focus state.</desc>

  <style><![CDATA[
    .bg-row     { fill: var(--surface, #f5f5f4); stroke: var(--line-soft, #d6d6d6); stroke-width: 1; }
    .bg-col     { fill: var(--info-soft, #dbeafe); stroke: var(--info, #1d4ed8); stroke-width: 1; }
    .bg-corner  { fill: var(--surface-edge, #fef9c3); stroke: var(--warn, #b45309); stroke-width: 1.2; }
    .bg-deliver { fill: var(--ok-soft, #dcfce7); stroke: var(--ok, #15803d); stroke-width: 1; }
    .bg-skip    { fill: var(--surface, #fafafa); stroke: var(--line-soft, #d6d6d6); stroke-width: 1; }
    .bg-queue   { fill: var(--warn-soft, #fef3c7); stroke: var(--warn, #b45309); stroke-width: 1; }
    .bg-halt    { fill: var(--accent-soft, #fce7f3); stroke: var(--accent, #be185d); stroke-width: 1; }
    .ink        { fill: var(--ink-strong, #0f172a); }
    .ink-soft   { fill: var(--ink-muted, #475569); }
    .label      { font-family: system-ui, -apple-system, "SF Pro Text", sans-serif; }
    .h1         { font: 700 26px/1.1 system-ui, sans-serif; }
    .h2         { font: 700 16px/1.2 system-ui, sans-serif; fill: var(--accent, #6b21a8); }
    .body       { font: 500 12px/1.25 system-ui, sans-serif; }
    .small      { font: 500 10.5px/1.2 system-ui, sans-serif; }
    .pill       { fill: var(--surface, #fff); stroke: var(--line-soft, #d6d6d6); }
    .pill-text  { font: 600 11px/1 system-ui, sans-serif; }

    @media (prefers-color-scheme: dark) {
      .bg-row     { fill: #1e293b; stroke: #475569; }
      .bg-col     { fill: #1e3a8a; stroke: #60a5fa; }
      .bg-corner  { fill: #422006; stroke: #fbbf24; }
      .bg-deliver { fill: #064e3b; stroke: #34d399; }
      .bg-skip    { fill: #1e293b; stroke: #475569; }
      .bg-queue   { fill: #422006; stroke: #fbbf24; }
      .bg-halt    { fill: #500724; stroke: #ec4899; }
      .ink        { fill: #e2e8f0; }
      .ink-soft   { fill: #94a3b8; }
      .h2         { fill: #c084fc; }
      .pill       { fill: #1e293b; stroke: #475569; }
    }
  ]]></style>

  <!-- Title -->
  <text x="540" y="36" class="label h1 ink" text-anchor="middle">Mode matrices</text>
  <text x="540" y="58" class="label body ink-soft" text-anchor="middle">routing token × room mode  ·  focus state × inbox behaviour</text>

  <!-- ─── MATRIX 1: routing × room-mode ─────────────────────────── -->
  <g transform="translate(40, 95)">
    <text class="label h2" x="0" y="0">Matrix 1 · Routing token × Room mode</text>

    <!-- corner -->
    <rect class="bg-corner" x="0" y="20" width="160" height="36"/>
    <text class="label small ink-soft" x="80" y="42" text-anchor="middle">token \ mode</text>

    <!-- column headers -->
    <rect class="bg-col" x="160" y="20" width="180" height="36"/>
    <text class="label small ink" x="250" y="42" text-anchor="middle">brainstorm (default)</text>

    <rect class="bg-col" x="340" y="20" width="180" height="36"/>
    <text class="label small ink" x="430" y="42" text-anchor="middle">heads-down</text>

    <rect class="bg-col" x="520" y="20" width="180" height="36"/>
    <text class="label small ink" x="610" y="42" text-anchor="middle">focus (one or more agents focused)</text>

    <!-- Row: bare @X -->
    <rect class="bg-row" x="0" y="56" width="160" height="36"/>
    <text class="label small ink" x="80" y="78" text-anchor="middle">bare @X</text>

    <rect class="bg-deliver" x="160" y="56" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="78" text-anchor="middle">inject X only</text>

    <rect class="bg-deliver" x="340" y="56" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="78" text-anchor="middle">inject X only (skip walk)</text>

    <rect class="bg-queue" x="520" y="56" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="78" text-anchor="middle">if X focused → queue, else inject X</text>

    <!-- Row: [@X] -->
    <rect class="bg-row" x="0" y="92" width="160" height="36"/>
    <text class="label small ink" x="80" y="114" text-anchor="middle">[@X] (bracketed)</text>

    <rect class="bg-skip" x="160" y="92" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="114" text-anchor="middle">no inject (text only)</text>

    <rect class="bg-skip" x="340" y="92" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="114" text-anchor="middle">no inject (text only)</text>

    <rect class="bg-skip" x="520" y="92" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="114" text-anchor="middle">no inject (text only)</text>

    <!-- Row: @everyone -->
    <rect class="bg-row" x="0" y="128" width="160" height="36"/>
    <text class="label small ink" x="80" y="150" text-anchor="middle">@everyone</text>

    <rect class="bg-deliver" x="160" y="128" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="150" text-anchor="middle">broadcast (all, ex sender)</text>

    <rect class="bg-deliver" x="340" y="128" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="150" text-anchor="middle">broadcast (all, ex sender)</text>

    <rect class="bg-queue" x="520" y="128" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="150" text-anchor="middle">focused agents queue, others inject</text>

    <!-- Row: plain text -->
    <rect class="bg-row" x="0" y="164" width="160" height="36"/>
    <text class="label small ink" x="80" y="186" text-anchor="middle">plain text</text>

    <rect class="bg-deliver" x="160" y="164" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="186" text-anchor="middle">parallel fanout (all eligible)</text>

    <rect class="bg-deliver" x="340" y="164" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="186" text-anchor="middle">ordered responder walk</text>

    <rect class="bg-queue" x="520" y="164" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="186" text-anchor="middle">focused agents queue, others inject</text>

    <!-- Row: break-event -->
    <rect class="bg-row" x="0" y="200" width="160" height="36"/>
    <text class="label small ink" x="80" y="222" text-anchor="middle">/break (event)</text>

    <rect class="bg-queue" x="160" y="200" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="222" text-anchor="middle">sender becomes break/focused</text>

    <rect class="bg-queue" x="340" y="200" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="222" text-anchor="middle">same (walk skips them next time)</text>

    <rect class="bg-queue" x="520" y="200" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="222" text-anchor="middle">already focused → no-op</text>

    <!-- Row: [@everyone hold] -->
    <rect class="bg-row" x="0" y="236" width="160" height="36"/>
    <text class="label small ink" x="80" y="258" text-anchor="middle">[@everyone hold]</text>

    <rect class="bg-halt" x="160" y="236" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="258" text-anchor="middle">HALT (no inject; future primitive)</text>

    <rect class="bg-halt" x="340" y="236" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="258" text-anchor="middle">HALT (walk pauses)</text>

    <rect class="bg-halt" x="520" y="236" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="258" text-anchor="middle">HALT (digest paused too)</text>
  </g>

  <!-- ─── MATRIX 2: focus × inbox-queue ──────────────────────────── -->
  <g transform="translate(40, 410)">
    <text class="label h2" x="0" y="0">Matrix 2 · Per-agent focus × inbox-queue behaviour</text>

    <rect class="bg-corner" x="0" y="20" width="160" height="36"/>
    <text class="label small ink-soft" x="80" y="42" text-anchor="middle">addressed \ focus state</text>

    <rect class="bg-col" x="160" y="20" width="180" height="36"/>
    <text class="label small ink" x="250" y="42" text-anchor="middle">focus off</text>

    <rect class="bg-col" x="340" y="20" width="180" height="36"/>
    <text class="label small ink" x="430" y="42" text-anchor="middle">focus 30m (TTL)</text>

    <rect class="bg-col" x="520" y="20" width="180" height="36"/>
    <text class="label small ink" x="610" y="42" text-anchor="middle">focus indefinite</text>

    <rect class="bg-col" x="700" y="20" width="200" height="36"/>
    <text class="label small ink" x="800" y="42" text-anchor="middle">focus + [@everyone hold]</text>

    <!-- Row: bare @me -->
    <rect class="bg-row" x="0" y="56" width="160" height="36"/>
    <text class="label small ink" x="80" y="78" text-anchor="middle">bare @me</text>

    <rect class="bg-deliver" x="160" y="56" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="78" text-anchor="middle">live inject</text>

    <rect class="bg-queue" x="340" y="56" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="78" text-anchor="middle">queue to digest · countdown</text>

    <rect class="bg-queue" x="520" y="56" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="78" text-anchor="middle">queue until manual toggle off</text>

    <rect class="bg-halt" x="700" y="56" width="200" height="36"/>
    <text class="label small ink-soft" x="800" y="78" text-anchor="middle">HALT pauses even the digest</text>

    <!-- Row: [@me] -->
    <rect class="bg-row" x="0" y="92" width="160" height="36"/>
    <text class="label small ink" x="80" y="114" text-anchor="middle">[@me] (bracketed)</text>

    <rect class="bg-skip" x="160" y="92" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="114" text-anchor="middle">no inject (text only)</text>

    <rect class="bg-skip" x="340" y="92" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="114" text-anchor="middle">no inject (text only)</text>

    <rect class="bg-skip" x="520" y="92" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="114" text-anchor="middle">no inject (text only)</text>

    <rect class="bg-halt" x="700" y="92" width="200" height="36"/>
    <text class="label small ink-soft" x="800" y="114" text-anchor="middle">HALT (still text-only)</text>

    <!-- Row: @everyone -->
    <rect class="bg-row" x="0" y="128" width="160" height="36"/>
    <text class="label small ink" x="80" y="150" text-anchor="middle">@everyone</text>

    <rect class="bg-deliver" x="160" y="128" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="150" text-anchor="middle">live inject (broadcast)</text>

    <rect class="bg-queue" x="340" y="128" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="150" text-anchor="middle">queue (counts in digest)</text>

    <rect class="bg-queue" x="520" y="128" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="150" text-anchor="middle">queue (counts in digest)</text>

    <rect class="bg-halt" x="700" y="128" width="200" height="36"/>
    <text class="label small ink-soft" x="800" y="150" text-anchor="middle">HALT (no queue, just held)</text>

    <!-- Row: plain text -->
    <rect class="bg-row" x="0" y="164" width="160" height="36"/>
    <text class="label small ink" x="80" y="186" text-anchor="middle">plain text</text>

    <rect class="bg-deliver" x="160" y="164" width="180" height="36"/>
    <text class="label small ink-soft" x="250" y="186" text-anchor="middle">live inject (per room mode)</text>

    <rect class="bg-queue" x="340" y="164" width="180" height="36"/>
    <text class="label small ink-soft" x="430" y="186" text-anchor="middle">queue (counts in digest)</text>

    <rect class="bg-queue" x="520" y="164" width="180" height="36"/>
    <text class="label small ink-soft" x="610" y="186" text-anchor="middle">queue (counts in digest)</text>

    <rect class="bg-halt" x="700" y="164" width="200" height="36"/>
    <text class="label small ink-soft" x="800" y="186" text-anchor="middle">HALT (no queue)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 660)">
    <text class="label h2" x="0" y="0">Legend</text>
    <rect class="bg-deliver" x="0"   y="14" width="20" height="20" rx="3"/>
    <text class="label small ink"   x="30"  y="29">live inject (pty-inject delivery)</text>
    <rect class="bg-queue"   x="240" y="14" width="20" height="20" rx="3"/>
    <text class="label small ink"   x="270" y="29">queue / digest (delayed delivery)</text>
    <rect class="bg-skip"    x="480" y="14" width="20" height="20" rx="3"/>
    <text class="label small ink"   x="510" y="29">no inject (text only)</text>
    <rect class="bg-halt"    x="700" y="14" width="20" height="20" rx="3"/>
    <text class="label small ink"   x="730" y="29">HALT primitive (future [@everyone hold])</text>
    <text class="label small ink-soft" x="0" y="60">All cells consistent with fresh-ant-rules-manual + ask_hj2ubjbum8dmpce8dc1 + task 01cbaa23 + filed [@everyone hold] proposal.</text>
    <rect class="pill" x="930" y="-15" width="120" height="22" rx="11"/>
    <text class="label pill-text ink" x="990" y="0" text-anchor="middle">OSS · canvas-eligible</text>
  </g>
</svg>
