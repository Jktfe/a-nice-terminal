<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">ANT decision trees triptych — room, mention, claim</title>
  <desc id="desc">Three decision trees: which-room-do-I-post-in, bracketed-vs-bare-@, and when-to-claim. Helps agents and humans pick the right routing+reaction primitive at message time.</desc>

  <style><![CDATA[
    .bg-q       { fill: var(--info-soft, #dbeafe); stroke: var(--info, #1d4ed8); stroke-width: 1.5; }
    .bg-a       { fill: var(--ok-soft, #dcfce7); stroke: var(--ok, #15803d); stroke-width: 1.5; }
    .bg-room    { fill: var(--accent-soft, #fce7f3); stroke: var(--accent, #be185d); stroke-width: 1.5; }
    .bg-warn    { fill: var(--warn-soft, #fef3c7); stroke: var(--warn, #b45309); stroke-width: 1.5; }
    .ink        { fill: var(--ink-strong, #0f172a); }
    .ink-soft   { fill: var(--ink-muted, #475569); }
    .arrow      { stroke: var(--ink-strong, #0f172a); stroke-width: 1.4; fill: none; }
    .label      { font-family: system-ui, -apple-system, "SF Pro Text", sans-serif; }
    .h1         { font: 700 28px/1.1 system-ui, sans-serif; }
    .h2         { font: 700 14px/1.2 system-ui, sans-serif; }
    .col-head   { font: 700 16px/1.2 system-ui, sans-serif; fill: var(--accent, #6b21a8); }
    .body       { font: 500 12px/1.2 system-ui, sans-serif; }
    .small      { font: 500 11px/1.2 system-ui, sans-serif; }
    .edge       { font: 600 10px/1 system-ui, sans-serif; fill: var(--ink-muted, #64748b); }
    .pill       { fill: var(--surface, #fff); stroke: var(--line-soft, #d6d6d6); }
    .pill-text  { font: 600 11px/1 system-ui, sans-serif; }

    @media (prefers-color-scheme: dark) {
      .bg-q       { fill: #1e3a8a; stroke: #60a5fa; }
      .bg-a       { fill: #064e3b; stroke: #34d399; }
      .bg-room    { fill: #500724; stroke: #ec4899; }
      .bg-warn    { fill: #422006; stroke: #fbbf24; }
      .ink        { fill: #e2e8f0; }
      .ink-soft   { fill: #94a3b8; }
      .arrow      { stroke: #e2e8f0; }
      .col-head   { fill: #c084fc; }
      .edge       { fill: #94a3b8; }
      .pill       { fill: #1e293b; stroke: #475569; }
    }
  ]]></style>

  <!-- Title -->
  <text x="540" y="40" class="label h1 ink" text-anchor="middle">Decision trees · triptych</text>
  <text x="540" y="64" class="label body ink-soft" text-anchor="middle">which room · bracketed vs bare @ · when to claim</text>

  <!-- COLUMN 1: WHICH ROOM -->
  <g transform="translate(40, 100)">
    <text class="label col-head" x="160" y="0" text-anchor="middle">Which room do I post in?</text>

    <rect class="bg-q" x="80" y="20" width="160" height="40" rx="8"/>
    <text class="label body ink" x="160" y="44" text-anchor="middle">What kind of work?</text>

    <line class="arrow" x1="120" y1="60" x2="60"  y2="100" marker-end="url(#a)"/>
    <line class="arrow" x1="160" y1="60" x2="160" y2="100" marker-end="url(#a)"/>
    <line class="arrow" x1="200" y1="60" x2="260" y2="100" marker-end="url(#a)"/>

    <text class="edge"   x="80"  y="90"  text-anchor="middle">multi-agent</text>
    <text class="edge"   x="160" y="90"  text-anchor="middle">UX feedback</text>
    <text class="edge"   x="240" y="90"  text-anchor="middle">native apps</text>

    <rect class="bg-room" x="10"  y="110" width="100" height="50" rx="8"/>
    <text class="label small ink" x="60" y="130" text-anchor="middle">antv4</text>
    <text class="label small ink-soft" x="60" y="148" text-anchor="middle">main coord</text>

    <rect class="bg-room" x="115" y="110" width="100" height="50" rx="8"/>
    <text class="label small ink" x="165" y="130" text-anchor="middle">voxfuhuezk</text>
    <text class="label small ink-soft" x="165" y="148" text-anchor="middle">AntUX (UX)</text>

    <rect class="bg-room" x="220" y="110" width="100" height="50" rx="8"/>
    <text class="label small ink" x="270" y="130" text-anchor="middle">9lkrn1nf7g</text>
    <text class="label small ink-soft" x="270" y="148" text-anchor="middle">antchatdev</text>

    <line class="arrow" x1="160" y1="170" x2="160" y2="200" marker-end="url(#a)"/>

    <rect class="bg-q" x="80" y="210" width="160" height="40" rx="8"/>
    <text class="label body ink" x="160" y="234" text-anchor="middle">Is it a decision/ask?</text>

    <line class="arrow" x1="120" y1="250" x2="80"  y2="290" marker-end="url(#a)"/>
    <line class="arrow" x1="200" y1="250" x2="240" y2="290" marker-end="url(#a)"/>
    <text class="edge" x="95"  y="280" text-anchor="middle">yes</text>
    <text class="edge" x="225" y="280" text-anchor="middle">no</text>

    <rect class="bg-room" x="20"  y="300" width="120" height="50" rx="8"/>
    <text class="label small ink" x="80" y="320" text-anchor="middle">lz0udiayuh</text>
    <text class="label small ink-soft" x="80" y="338" text-anchor="middle">v4 asks queue</text>

    <rect class="bg-room" x="180" y="300" width="120" height="50" rx="8"/>
    <text class="label small ink" x="240" y="320" text-anchor="middle">per-agent room</text>
    <text class="label small ink-soft" x="240" y="338" text-anchor="middle">if 1:1 needed</text>
  </g>

  <!-- COLUMN 2: BRACKETED vs BARE -->
  <g transform="translate(400, 100)">
    <text class="label col-head" x="160" y="0" text-anchor="middle">Bracketed [@] or bare @?</text>

    <rect class="bg-q" x="60" y="20" width="200" height="40" rx="8"/>
    <text class="label body ink" x="160" y="44" text-anchor="middle">Do I want them to act?</text>

    <line class="arrow" x1="120" y1="60" x2="60"  y2="100" marker-end="url(#a)"/>
    <line class="arrow" x1="200" y1="60" x2="260" y2="100" marker-end="url(#a)"/>
    <text class="edge" x="80"  y="90" text-anchor="middle">yes</text>
    <text class="edge" x="240" y="90" text-anchor="middle">no — just informing</text>

    <rect class="bg-a" x="10"  y="110" width="120" height="60" rx="8"/>
    <text class="label small ink" x="70" y="132" text-anchor="middle">bare @handle</text>
    <text class="label small ink-soft" x="70" y="150" text-anchor="middle">delivery instruction</text>
    <text class="label small ink-soft" x="70" y="164" text-anchor="middle">→ pty-inject</text>

    <rect class="bg-warn" x="200" y="110" width="120" height="60" rx="8"/>
    <text class="label small ink" x="260" y="132" text-anchor="middle">bracketed [@handle]</text>
    <text class="label small ink-soft" x="260" y="150" text-anchor="middle">informational</text>
    <text class="label small ink-soft" x="260" y="164" text-anchor="middle">→ no inject</text>

    <line class="arrow" x1="160" y1="180" x2="160" y2="210" marker-end="url(#a)"/>

    <rect class="bg-q" x="60" y="220" width="200" height="40" rx="8"/>
    <text class="label body ink" x="160" y="244" text-anchor="middle">All eligible or specific?</text>

    <line class="arrow" x1="120" y1="260" x2="60"  y2="300" marker-end="url(#a)"/>
    <line class="arrow" x1="200" y1="260" x2="260" y2="300" marker-end="url(#a)"/>
    <text class="edge" x="80"  y="290" text-anchor="middle">all</text>
    <text class="edge" x="240" y="290" text-anchor="middle">specific</text>

    <rect class="bg-warn" x="10"  y="310" width="120" height="60" rx="8"/>
    <text class="label small ink" x="70" y="332" text-anchor="middle">bare @everyone</text>
    <text class="label small ink-soft" x="70" y="350" text-anchor="middle">broadcast</text>
    <text class="label small ink-soft" x="70" y="364" text-anchor="middle">use sparingly</text>

    <rect class="bg-a" x="200" y="310" width="120" height="60" rx="8"/>
    <text class="label small ink" x="260" y="332" text-anchor="middle">bare @X bare @Y</text>
    <text class="label small ink-soft" x="260" y="350" text-anchor="middle">narrow targets</text>
    <text class="label small ink-soft" x="260" y="364" text-anchor="middle">explicit pair</text>
  </g>

  <!-- COLUMN 3: WHEN TO CLAIM -->
  <g transform="translate(760, 100)">
    <text class="label col-head" x="140" y="0" text-anchor="middle">When to 🖐️ / 🤝 / 👐 ?</text>

    <rect class="bg-q" x="40" y="20" width="200" height="40" rx="8"/>
    <text class="label body ink" x="140" y="44" text-anchor="middle">What am I doing right now?</text>

    <line class="arrow" x1="80"  y1="60" x2="50"  y2="100" marker-end="url(#a)"/>
    <line class="arrow" x1="140" y1="60" x2="140" y2="100" marker-end="url(#a)"/>
    <line class="arrow" x1="200" y1="60" x2="230" y2="100" marker-end="url(#a)"/>

    <text class="edge" x="50"  y="90"  text-anchor="middle">skimming</text>
    <text class="edge" x="140" y="90"  text-anchor="middle">committing</text>
    <text class="edge" x="230" y="90"  text-anchor="middle">declining</text>

    <rect class="bg-warn" x="0"   y="110" width="90" height="70" rx="8"/>
    <text class="label small ink" x="45" y="132" text-anchor="middle">🖐️</text>
    <text class="label small ink-soft" x="45" y="148" text-anchor="middle">looking</text>
    <text class="label small ink-soft" x="45" y="162" text-anchor="middle">90s soft hold</text>

    <rect class="bg-a" x="95"  y="110" width="90" height="70" rx="8"/>
    <text class="label small ink" x="140" y="132" text-anchor="middle">🤝</text>
    <text class="label small ink-soft" x="140" y="148" text-anchor="middle">working</text>
    <text class="label small ink-soft" x="140" y="162" text-anchor="middle">TTL claim</text>

    <rect class="bg-warn" x="190" y="110" width="90" height="70" rx="8"/>
    <text class="label small ink" x="235" y="132" text-anchor="middle">👐</text>
    <text class="label small ink-soft" x="235" y="148" text-anchor="middle">passing</text>
    <text class="label small ink-soft" x="235" y="162" text-anchor="middle">advances walk</text>

    <line class="arrow" x1="140" y1="180" x2="140" y2="210" marker-end="url(#a)"/>

    <rect class="bg-q" x="40" y="220" width="200" height="40" rx="8"/>
    <text class="label body ink" x="140" y="244" text-anchor="middle">Read-only awareness?</text>

    <line class="arrow" x1="140" y1="260" x2="140" y2="300" marker-end="url(#a)"/>

    <rect class="bg-room" x="20" y="310" width="240" height="60" rx="8"/>
    <text class="label small ink" x="140" y="332" text-anchor="middle">no reaction needed</text>
    <text class="label small ink-soft" x="140" y="350" text-anchor="middle">read-receipts handle visibility</text>
    <text class="label small ink-soft" x="140" y="364" text-anchor="middle">don't pollute the claim ledger</text>
  </g>

  <!-- Footer -->
  <g transform="translate(40, 670)">
    <text class="label small ink-soft" x="0" y="0">All three trees ratified against fresh-ant-rules-manual + locked claim primitive spec. Composes with claim-primitive · routing-modes · terminal-lifecycle · ask-flow visuals.</text>
    <rect class="pill" x="930" y="-15" width="120" height="22" rx="11"/>
    <text class="label pill-text ink" x="990" y="0" text-anchor="middle">OSS · canvas-eligible</text>
  </g>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
</svg>
