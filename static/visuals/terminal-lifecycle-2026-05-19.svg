<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">ANT terminal lifecycle — state machine</title>
  <desc id="desc">Terminal state transitions from spawn through active, break, and tombstone (archive vs delete). Shows the Kill+(Delete|Archive) split and the /vault preservation surface.</desc>

  <style><![CDATA[
    .bg-card    { fill: var(--surface, #fff); stroke: var(--line-soft, #d6d6d6); stroke-width: 1.5; }
    .bg-spawn   { fill: var(--info-soft, #dbeafe); stroke: var(--info, #1d4ed8); stroke-width: 1.5; }
    .bg-active  { fill: var(--ok-soft, #dcfce7); stroke: var(--ok, #15803d); stroke-width: 2; }
    .bg-break   { fill: var(--warn-soft, #fef3c7); stroke: var(--warn, #b45309); stroke-width: 1.5; }
    .bg-archive { fill: var(--accent-soft, #ede9fe); stroke: var(--accent, #6b21a8); stroke-width: 1.5; }
    .bg-delete  { fill: var(--danger-soft, #fee2e2); stroke: var(--danger, #b91c1c); stroke-width: 1.5; }
    .ink        { fill: var(--ink-strong, #0f172a); }
    .ink-soft   { fill: var(--ink-muted, #475569); }
    .arrow      { stroke: var(--ink-strong, #0f172a); stroke-width: 1.5; fill: none; }
    .arrow-rev  { stroke: var(--ink-muted, #64748b); stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
    .label      { font-family: system-ui, -apple-system, "SF Pro Text", "Segoe UI", sans-serif; }
    .h1         { font: 700 28px/1.1 system-ui, sans-serif; }
    .h2         { font: 700 14px/1.2 system-ui, sans-serif; }
    .body       { font: 500 12px/1.25 system-ui, sans-serif; }
    .small      { font: 500 11px/1.2 system-ui, sans-serif; }
    .edge-label { font: 600 11px/1 system-ui, sans-serif; }
    .pill       { fill: var(--surface, #fff); stroke: var(--line-soft, #d6d6d6); }
    .pill-text  { font: 600 11px/1 system-ui, sans-serif; }

    @media (prefers-color-scheme: dark) {
      .bg-card    { fill: #1e293b; stroke: #475569; }
      .bg-spawn   { fill: #1e3a8a; stroke: #60a5fa; }
      .bg-active  { fill: #064e3b; stroke: #34d399; }
      .bg-break   { fill: #422006; stroke: #fbbf24; }
      .bg-archive { fill: #2e1065; stroke: #c084fc; }
      .bg-delete  { fill: #450a0a; stroke: #f87171; }
      .ink        { fill: #e2e8f0; }
      .ink-soft   { fill: #94a3b8; }
      .arrow      { stroke: #e2e8f0; }
      .arrow-rev  { stroke: #94a3b8; }
      .pill       { fill: #1e293b; stroke: #475569; }
    }
  ]]></style>

  <!-- Title -->
  <text x="540" y="40" class="label h1 ink" text-anchor="middle">Terminal lifecycle</text>
  <text x="540" y="64" class="label body ink-soft" text-anchor="middle">spawn → active → (break) → tombstone(archive | delete) — and back, if you want</text>

  <!-- States arranged left-to-right with break above active -->

  <!-- Spawn -->
  <g transform="translate(40, 200)">
    <rect class="bg-spawn" x="0" y="0" width="140" height="100" rx="10"/>
    <text class="label h2 ink" x="70" y="22" text-anchor="middle">SPAWN</text>
    <text class="label small ink-soft" x="70" y="44" text-anchor="middle">terminal created</text>
    <text class="label small ink-soft" x="70" y="60" text-anchor="middle">alive · no posts</text>
    <text class="label small ink-soft" x="70" y="80" text-anchor="middle">identity-gate pending</text>
  </g>

  <!-- Active -->
  <g transform="translate(280, 200)">
    <rect class="bg-active" x="0" y="0" width="180" height="100" rx="10"/>
    <text class="label h2 ink" x="90" y="22" text-anchor="middle">ACTIVE</text>
    <text class="label small ink-soft" x="90" y="44" text-anchor="middle">posting · receiving</text>
    <text class="label small ink-soft" x="90" y="60" text-anchor="middle">pty-inject delivery on</text>
    <text class="label small ink-soft" x="90" y="80" text-anchor="middle">claimable for messages</text>
  </g>

  <!-- Break (above Active) -->
  <g transform="translate(280, 60)">
    <rect class="bg-break" x="0" y="0" width="180" height="80" rx="10"/>
    <text class="label h2 ink" x="90" y="22" text-anchor="middle">BREAK / FOCUSED</text>
    <text class="label small ink-soft" x="90" y="44" text-anchor="middle">queue-to-digest mode</text>
    <text class="label small ink-soft" x="90" y="60" text-anchor="middle">TTL countdown active</text>
  </g>

  <!-- Tombstone wrapper -->
  <g transform="translate(560, 60)">
    <text class="label h2 ink-soft" x="220" y="-10" text-anchor="middle">TOMBSTONE</text>
    <text class="label small ink-soft" x="220" y="6" text-anchor="middle">tmux pane killed in both branches</text>
  </g>

  <!-- Tombstone (Archive) -->
  <g transform="translate(560, 130)">
    <rect class="bg-archive" x="0" y="0" width="200" height="120" rx="10"/>
    <text class="label h2 ink" x="100" y="22" text-anchor="middle">ARCHIVE</text>
    <text class="label small ink-soft" x="100" y="44" text-anchor="middle">ANT record preserved:</text>
    <text class="label small ink-soft" x="100" y="60" text-anchor="middle">handle · kind · lifetime</text>
    <text class="label small ink-soft" x="100" y="76" text-anchor="middle">message_count · summary</text>
    <text class="label small ink-soft" x="100" y="92" text-anchor="middle">last_n_decisions</text>
    <text class="label small ink-soft" x="100" y="108" text-anchor="middle">→ visible in /vault</text>
  </g>

  <!-- Tombstone (Delete) -->
  <g transform="translate(560, 280)">
    <rect class="bg-delete" x="0" y="0" width="200" height="100" rx="10"/>
    <text class="label h2 ink" x="100" y="22" text-anchor="middle">DELETE</text>
    <text class="label small ink-soft" x="100" y="44" text-anchor="middle">ANT record removed</text>
    <text class="label small ink-soft" x="100" y="60" text-anchor="middle">destructive · no /vault</text>
    <text class="label small ink-soft" x="100" y="76" text-anchor="middle">raw pty + chat unlinked</text>
  </g>

  <!-- Unarchive return path target (re-active) -->
  <g transform="translate(820, 200)">
    <rect class="bg-active" x="0" y="0" width="180" height="100" rx="10" opacity="0.6"/>
    <text class="label h2 ink" x="90" y="22" text-anchor="middle">RE-ACTIVE</text>
    <text class="label small ink-soft" x="90" y="44" text-anchor="middle">(unarchive — rare)</text>
    <text class="label small ink-soft" x="90" y="60" text-anchor="middle">terminal_records row</text>
    <text class="label small ink-soft" x="90" y="76" text-anchor="middle">restored from archive</text>
  </g>

  <!-- Arrows: spawn → active -->
  <line class="arrow" x1="180" y1="250" x2="278" y2="250" marker-end="url(#a)"/>
  <text class="label edge-label ink-soft" x="229" y="240" text-anchor="middle">first post</text>

  <!-- Arrows: active ↔ break (vertical) -->
  <line class="arrow" x1="350" y1="200" x2="350" y2="142" marker-end="url(#a)"/>
  <text class="label edge-label ink-soft" x="365" y="175" text-anchor="start">/break · focus on</text>
  <line class="arrow-rev" x1="390" y1="142" x2="390" y2="198" marker-end="url(#a)"/>
  <text class="label edge-label ink-soft" x="400" y="175" text-anchor="start">focus off · expiry</text>

  <!-- Arrows: active OR break → archive -->
  <path class="arrow" d="M 460 230 Q 510 230 510 190 L 555 190" marker-end="url(#a)"/>
  <text class="label edge-label ink-soft" x="495" y="200" text-anchor="middle">Kill + Archive</text>
  <path class="arrow" d="M 460 100 Q 510 100 510 170 L 555 170" marker-end="url(#a)"/>

  <!-- Arrows: active OR break → delete -->
  <path class="arrow" d="M 460 270 Q 510 270 510 320 L 555 320" marker-end="url(#a)"/>
  <text class="label edge-label ink-soft" x="495" y="305" text-anchor="middle">Kill + Delete</text>

  <!-- Arrow: archive → re-active (unarchive) -->
  <path class="arrow-rev" d="M 760 190 Q 800 190 815 250" marker-end="url(#a)"/>
  <text class="label edge-label ink-soft" x="790" y="200" text-anchor="middle">unarchive</text>

  <!-- Footer / legend -->
  <g transform="translate(40, 420)">
    <text class="label h2 ink" x="0" y="0">Legend</text>
    <rect class="bg-spawn"   x="0"   y="14" width="20" height="20" rx="4"/>
    <text class="label small ink"   x="30"  y="29">spawn — created, identity-gate pending</text>
    <rect class="bg-active"  x="260" y="14" width="20" height="20" rx="4"/>
    <text class="label small ink"   x="290" y="29">active — posting, receiving, claimable</text>
    <rect class="bg-break"   x="540" y="14" width="20" height="20" rx="4"/>
    <text class="label small ink"   x="570" y="29">break / focused — queue-to-digest, TTL active</text>
    <rect class="bg-archive" x="0"   y="44" width="20" height="20" rx="4"/>
    <text class="label small ink"   x="30"  y="59">tombstone · archive — ANT record preserved in /vault</text>
    <rect class="bg-delete"  x="350" y="44" width="20" height="20" rx="4"/>
    <text class="label small ink"   x="380" y="59">tombstone · delete — destructive, no record</text>
    <text class="label small ink-soft" x="0" y="92">Per-terminal default disposition picker (terminal_records.default_kill_disposition) pre-selects archive vs delete. KillConfirmModal honours the default + allows override. Sensible defaults: archive for long-lived agents (claude/codex/svelte/ux), delete for short-lived tooling panes.</text>
    <text class="label small ink-soft" x="0" y="120">Spec: ask Kill+(Delete|Archive) modal (task 7d581ec8). Composes with /vault page (f0d4b896) and --atOnly (d7a46f6a).</text>
  </g>

  <!-- Tier badge -->
  <g transform="translate(990, 510)">
    <rect class="pill" x="-60" y="-15" width="120" height="22" rx="11"/>
    <text class="label pill-text ink" x="0" y="0" text-anchor="middle">OSS · canvas-eligible</text>
  </g>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
</svg>
