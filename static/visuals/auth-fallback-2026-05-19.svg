<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img" aria-labelledby="title desc">
  <title id="title">Auth flow with server-down degradation — gold-standard hard rule</title>
  <desc id="desc">Sequence diagram showing Bearer auth from login through token persistence, server-up steady state, server-down graceful degradation, and reconnect. Demonstrates JWPK msg_gnv0oeuva2 hard rule that server-down never blocks CLI/app usage.</desc>
  <style><![CDATA[
    .bg-card  { fill: var(--surface, #fff); stroke: var(--line-soft, #d6d6d6); stroke-width: 1.5; }
    .bg-step  { fill: var(--info-soft, #dbeafe); stroke: var(--info, #1d4ed8); stroke-width: 1.5; }
    .bg-ok    { fill: var(--ok-soft, #dcfce7); stroke: var(--ok, #15803d); stroke-width: 2; }
    .bg-warn  { fill: var(--warn-soft, #fef3c7); stroke: var(--warn, #b45309); stroke-width: 1.5; stroke-dasharray: 5 3; }
    .ink      { fill: var(--ink-strong, #0f172a); }
    .ink-soft { fill: var(--ink-muted, #475569); }
    .arrow    { stroke: var(--ink-strong, #0f172a); stroke-width: 1.5; fill: none; }
    .label    { font-family: system-ui, -apple-system, "SF Pro Text", "Segoe UI", sans-serif; }
    .h1       { font: 700 26px/1.1 system-ui, sans-serif; }
    .h2       { font: 700 13px/1.2 system-ui, sans-serif; }
    .body     { font: 500 11px/1.3 system-ui, sans-serif; }
    .mono     { font: 500 11px/1.2 ui-monospace, "SF Mono", Menlo, monospace; fill: var(--ink-strong, #0f172a); }
    .edge     { font: 600 10px/1 system-ui, sans-serif; }
    .pill     { fill: var(--surface, #fff); stroke: var(--line-soft, #d6d6d6); }
    .pill-text { font: 700 11px/1 system-ui, sans-serif; }

    @media (prefers-color-scheme: dark) {
      .bg-card  { fill: #1e293b; stroke: #475569; }
      .bg-step  { fill: #1e3a8a; stroke: #60a5fa; }
      .bg-ok    { fill: #064e3b; stroke: #34d399; }
      .bg-warn  { fill: #422006; stroke: #fbbf24; }
      .ink      { fill: #e2e8f0; }
      .ink-soft { fill: #94a3b8; }
      .arrow    { stroke: #e2e8f0; }
      .pill     { fill: #1e293b; stroke: #475569; }
    }
  ]]></style>

  <text x="540" y="36" class="label h1 ink" text-anchor="middle">Auth flow with server-down degradation</text>
  <text x="540" y="58" class="label body ink-soft" text-anchor="middle">JWPK hard rule: server-down ≠ block. App keeps working in plain mode. ANT is enhancement, not critical path.</text>

  <!-- Step 1: Login -->
  <g transform="translate(40, 100)">
    <rect class="bg-step" x="0" y="0" width="180" height="100" rx="10"/>
    <text class="label h2 ink" x="90" y="22" text-anchor="middle">1. Login</text>
    <text class="mono" x="90" y="48" text-anchor="middle">POST /api/auth/login</text>
    <text class="label body ink-soft" x="90" y="68" text-anchor="middle">licence code:</text>
    <text class="mono" x="90" y="84" text-anchor="middle">NEW-MODEL-ANT-DEV-…</text>
  </g>

  <!-- Step 2: Token persisted -->
  <g transform="translate(250, 100)">
    <rect class="bg-step" x="0" y="0" width="180" height="100" rx="10"/>
    <text class="label h2 ink" x="90" y="22" text-anchor="middle">2. Token persisted</text>
    <text class="label body ink-soft" x="90" y="46" text-anchor="middle">tauri-plugin-store</text>
    <text class="label body ink-soft" x="90" y="62" text-anchor="middle">(or cookie for web)</text>
    <text class="label body ink-soft" x="90" y="82" text-anchor="middle">survives restart</text>
  </g>

  <!-- Step 3 happy path: ONLINE -->
  <g transform="translate(460, 80)">
    <rect class="bg-ok" x="0" y="0" width="200" height="80" rx="10"/>
    <text class="label h2 ink" x="100" y="22" text-anchor="middle">3a. ONLINE (steady)</text>
    <text class="label body ink-soft" x="100" y="44" text-anchor="middle">/api/health 200</text>
    <text class="label body ink-soft" x="100" y="60" text-anchor="middle">all routes work</text>
  </g>

  <!-- Step 3 sad path: DEGRADED -->
  <g transform="translate(460, 200)">
    <rect class="bg-warn" x="0" y="0" width="200" height="100" rx="10"/>
    <text class="label h2 ink" x="100" y="22" text-anchor="middle">3b. SERVER-DOWN</text>
    <text class="label body ink-soft" x="100" y="44" text-anchor="middle">/api/health 5xx/refused</text>
    <text class="label body ink-soft" x="100" y="60" text-anchor="middle">app stays responsive</text>
    <text class="label body ink-soft" x="100" y="76" text-anchor="middle">cached data renders</text>
    <text class="label body ink-soft" x="100" y="92" text-anchor="middle">writes queue locally</text>
  </g>

  <!-- Reconnecting -->
  <g transform="translate(700, 200)">
    <rect class="bg-step" x="0" y="0" width="180" height="100" rx="10"/>
    <text class="label h2 ink" x="90" y="22" text-anchor="middle">4. RECONNECT</text>
    <text class="label body ink-soft" x="90" y="44" text-anchor="middle">backoff 1s · 2s · 4s ·</text>
    <text class="label body ink-soft" x="90" y="60" text-anchor="middle">8s · 30s</text>
    <text class="label body ink-soft" x="90" y="80" text-anchor="middle">existing token retried</text>
    <text class="label body ink-soft" x="90" y="96" text-anchor="middle">NO re-login required</text>
  </g>

  <!-- Resumed -->
  <g transform="translate(900, 90)">
    <rect class="bg-ok" x="0" y="0" width="150" height="80" rx="10"/>
    <text class="label h2 ink" x="75" y="22" text-anchor="middle">5. RESUMED</text>
    <text class="label body ink-soft" x="75" y="44" text-anchor="middle">queued drafts</text>
    <text class="label body ink-soft" x="75" y="60" text-anchor="middle">flush in order</text>
  </g>

  <!-- Arrows -->
  <line class="arrow" x1="220" y1="150" x2="248" y2="150" marker-end="url(#a)"/>
  <line class="arrow" x1="430" y1="150" x2="458" y2="150" marker-end="url(#a)"/>

  <path class="arrow" d="M 560 160 Q 560 195 560 198" marker-end="url(#a)"/>
  <text class="label edge ink-soft" x="595" y="180" text-anchor="middle">health fails</text>

  <line class="arrow" x1="660" y1="250" x2="698" y2="250" marker-end="url(#a)"/>
  <text class="label edge ink-soft" x="679" y="243" text-anchor="middle">timer</text>

  <path class="arrow" d="M 790 200 Q 790 130 898 130" marker-end="url(#a)"/>
  <text class="label edge ink-soft" x="850" y="155" text-anchor="middle">/health 200</text>

  <!-- callout -->
  <g transform="translate(40, 320)">
    <rect class="bg-card" x="0" y="0" width="1000" height="100" rx="10"/>
    <text class="label h2 ink" x="20" y="22">Verified discipline (today's shipped infrastructure)</text>
    <text class="label body ink-soft" x="20" y="44">• Multi-cookie iteration (commits 2dd31af + 3b39aeb + 4924827 + 39fafee) — auth resolves any of N session cookies</text>
    <text class="label body ink-soft" x="20" y="60">• Env-driven hooks (281ead1 + b5e5039) — `ANT_SERVER_URL` overrides, `curl --max-time 2`, fail-open exit 0</text>
    <text class="label body ink-soft" x="20" y="76">• Server-down harness (fe3a96f) — 7-probe verification: app NEVER hangs when server is unreachable. 7/7 PASS today.</text>
    <text class="label body ink-soft" x="20" y="92">• This is gold standard. ANT enhances; absent ANT, the user's CLI / app still works in plain mode.</text>
  </g>

  <g transform="translate(40, 460)">
    <text class="label body ink-soft" x="0" y="0">windows-tauri-antchat-2026-05-19 plan · task wta-10 · pairs with bridge + scoop-install visuals</text>
    <rect class="pill" x="900" y="-15" width="120" height="22" rx="11"/>
    <text class="label pill-text ink" x="960" y="0" text-anchor="middle">OSS · canvas-eligible</text>
  </g>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
</svg>
